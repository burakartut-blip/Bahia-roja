<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAHIA ROJA 1984</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05050a;
    font-family:"Courier New", monospace; color:#d8d8e4; }
  canvas { display:block; touch-action:none; }
  ::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:4px; }

  #topbar {
    position:fixed; top:0; left:0; right:420px; height:58px; z-index:5;
    display:flex; align-items:center; gap:16px; padding:0 14px;
    background:linear-gradient(#0a0a14ee,#0a0a14cc);
    border-bottom:1px solid #ff2e8830; overflow-x:auto; overflow-y:hidden;
  }
  #topbar img { width:42px; height:42px; border-radius:4px; border:1px solid #ff2e88;
    box-shadow:0 0 10px #ff2e8860; image-rendering:pixelated; flex:none; }
  .tstat { line-height:1.25; flex:none; }
  .tstat .l { font-size:9px; letter-spacing:2px; color:#778; white-space:nowrap; }
  .tstat .v { font-size:15px; font-weight:bold; letter-spacing:1px; white-space:nowrap; }
  #tMoney .v { color:#5cffa8; text-shadow:0 0 8px #2eff8c60; }
  #tHeat .v { color:#ff6a4d; }
  #tTime .v { color:#cfe8ff; }
  #heatbar { width:64px; height:6px; background:#1a1a26; border-radius:3px; overflow:hidden; margin-top:3px; }
  #heatbar div { height:100%; width:0%; background:linear-gradient(90deg,#ffd21f,#ff6a4d,#ff1030); transition:width .5s; }
  .spdbtn {
    cursor:pointer; padding:6px 12px; font-size:12px; font-weight:bold;
    letter-spacing:2px; color:#4dddff; border:1px solid #19d3ff50; border-radius:4px;
    background:#0e1420; user-select:none; flex:none;
  }
  #sndBtn { margin-left:auto; }
  #logoTiny { font-size:15px; font-weight:bold; letter-spacing:3px; color:#ffe9f4;
    text-shadow:0 0 6px #ff2e88, 0 0 16px #ff2e88; flex:none; }

  #panel {
    position:fixed; top:0; right:0; bottom:0; width:420px; z-index:6;
    background:linear-gradient(180deg,#0b0b15f5,#0a0a12f8);
    border-left:1px solid #ff2e8830; display:flex; flex-direction:column;
    transition:height .25s;
  }
  #tabs { display:flex; border-bottom:1px solid #222234; overflow-x:auto; flex:none; }
  #tabs div {
    flex:1 0 auto; text-align:center; padding:12px 8px 10px; font-size:10px; letter-spacing:1px;
    color:#667; cursor:pointer; border-bottom:2px solid transparent; user-select:none; white-space:nowrap;
  }
  #tabs div.on { color:#ff5ea8; border-bottom-color:#ff2e88; text-shadow:0 0 8px #ff2e8880; }
  #panelMin { display:none; flex:none !important; color:#4dddff !important; font-size:13px !important; }
  #content { flex:1; overflow-y:auto; padding:12px; -webkit-overflow-scrolling:touch; }

  .card { background:#10101c; border:1px solid #222236; border-radius:6px; padding:10px 12px; margin-bottom:10px; }
  .card.hl { animation:hlp 1.6s ease-out; }
  @keyframes hlp { 0%,40% { border-color:#ff2e88; box-shadow:0 0 18px #ff2e8850; } }
  .card h3 { font-size:12px; letter-spacing:1px; margin-bottom:4px; }
  .muted { color:#667; font-size:10px; }
  .row { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
  .tag { font-size:9px; letter-spacing:1px; padding:2px 6px; border-radius:3px; border:1px solid; white-space:nowrap; }
  .btn {
    display:inline-block; cursor:pointer; padding:7px 13px; font-size:10px; letter-spacing:1px;
    font-weight:bold; border-radius:4px; border:1px solid #ff2e8860; color:#ff8ec0;
    background:#1a0e16; user-select:none; font-family:inherit;
  }
  .btn:active { background:#3a1828; }
  .btn.cy { border-color:#19d3ff50; color:#7ae0ff; background:#0e1620; }
  .btn.gn { border-color:#2eff8c50; color:#5cffa8; background:#0e1a14; }
  .btn.dis { opacity:.35; pointer-events:none; }
  .bar { height:5px; background:#1a1a26; border-radius:3px; overflow:hidden; }
  .bar div { height:100%; }
  .sect { font-size:10px; letter-spacing:2px; color:#889; margin:14px 0 8px; border-bottom:1px solid #1c1c2c; padding-bottom:4px; }
  .chk { display:flex; align-items:center; gap:6px; padding:6px; cursor:pointer; border-radius:4px; font-size:11px; }
  .statline { font-size:10px; color:#99a; letter-spacing:1px; }
  .obj { display:flex; gap:8px; align-items:center; font-size:11px; margin:4px 0; }
  .obj .ok { color:#5cffa8; } .obj .no { color:#556; }

  #modal {
    position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center; background:#050508a8;
  }
  #modalBox {
    width:460px; max-width:92vw; max-height:84vh; overflow-y:auto;
    background:#0e0e1a; border:1px solid #ff2e8860;
    border-radius:8px; padding:0; box-shadow:0 0 40px #ff2e8830;
  }
  #modalArt { width:100%; height:150px; object-fit:cover; display:none; border-bottom:1px solid #ff2e8840; }
  #modalInner { padding:20px 22px; }
  #modalBox h2 { font-size:15px; letter-spacing:2px; margin-bottom:12px; }
  #modalBox p { font-size:12px; line-height:1.6; color:#bbc; white-space:pre-line; }
  #modalBox .btn { margin-top:16px; }

  #story { position:fixed; inset:0; z-index:15; display:none; pointer-events:none; }
  #story .bar-t, #story .bar-b {
    position:absolute; left:0; right:0; height:52px; background:#030308;
  }
  #story .bar-t { top:0; } #story .bar-b { bottom:0; }
  #storyBox {
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:64px; width:680px; max-width:94vw; pointer-events:auto;
    background:#0b0b16f2; border:1px solid #ff2e8850; border-radius:8px;
    overflow:hidden; box-shadow:0 0 40px #00000090, 0 0 24px #ff2e8820;
  }
  #storyArt { width:100%; height:170px; object-fit:cover; display:block;
    border-bottom:1px solid #ff2e8840; image-rendering:pixelated; }
  #storyInner { padding:16px 20px 18px; }
  #storyBox .st { font-size:11px; letter-spacing:3px; color:#ff5ea8; margin-bottom:8px;
    text-shadow:0 0 8px #ff2e8860; }
  #storyBox .tx { font-size:13px; line-height:1.7; color:#d8d8e4; white-space:pre-line;
    max-height:32vh; overflow-y:auto; }
  #storyBox .ch { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  #storyBox .ch .btn { text-align:left; padding:9px 13px; font-size:11px; }

  /* ---------- GİRİŞ EKRANI — SYNTHWAVE ---------- */
  #title {
    position:fixed; inset:0; z-index:40; overflow:hidden;
    background:linear-gradient(180deg,#12041f 0%, #2a0a3a 34%, #6a1050 52%, #12041f 55%);
    display:flex; align-items:center; justify-content:center;
  }
  #tSun {
    position:absolute; left:50%; top:34%; transform:translate(-50%,-50%);
    width:340px; height:340px; border-radius:50%;
    background:linear-gradient(180deg,#ffe95c 0%, #ff9a3d 38%, #ff2e88 75%, #b8104f 100%);
    box-shadow:0 0 90px #ff2e8880, 0 0 200px #ff2e8830;
    -webkit-mask:repeating-linear-gradient(180deg,#000 0 26px, transparent 26px 34px);
            mask:repeating-linear-gradient(180deg,#000 0 26px, transparent 26px 34px);
  }
  #tGrid {
    position:absolute; left:-30%; right:-30%; bottom:-4%; height:48%;
    background:
      repeating-linear-gradient(90deg, #ff2e8870 0 2px, transparent 2px 68px),
      repeating-linear-gradient(0deg, #ff2e8870 0 2px, transparent 2px 46px),
      linear-gradient(180deg, transparent, #ff2e8815);
    transform:perspective(340px) rotateX(62deg);
    transform-origin:center bottom;
  }
  #tCenter { position:relative; text-align:center; z-index:2; margin-top:-4vh; }
  #tCenter img { width:120px; height:120px; border-radius:8px; border:2px solid #19d3ff;
    box-shadow:0 0 24px #19d3ff80; image-rendering:pixelated; }
  #tLogo { font-size:52px; font-weight:bold; letter-spacing:14px; color:#ffe9f4; margin-top:14px;
    text-shadow:0 0 10px #ff2e88, 0 0 34px #ff2e88, 0 0 80px #ff2e88; }
  #tSub { font-size:14px; letter-spacing:8px; color:#7ae0ff; margin-top:6px;
    text-shadow:0 0 12px #19d3ff; }
  #tLang { margin-top:30px; display:flex; gap:12px; justify-content:center; }
  #tLang .btn, #tStart .btn { font-size:13px; padding:11px 26px; letter-spacing:3px; }
  #tLang .btn.sel { background:#3a1828; color:#ffc0da; box-shadow:0 0 14px #ff2e8850; }
  #tStart { margin-top:16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  #tHint { margin-top:22px; font-size:10px; letter-spacing:2px; color:#8878a0; }
  @media (max-width:820px){
    #tLogo { font-size:30px; letter-spacing:8px; }
    #tSun { width:240px; height:240px; }
    #tCenter img { width:88px; height:88px; }
  }

  @media (max-width:820px){
    #topbar { right:0; height:52px; gap:12px; }
    #logoTiny { display:none; }
    #panel {
      top:auto; left:0; width:100%; height:54%;
      border-left:none; border-top:1px solid #ff2e8840;
    }
    body.pmin #panel { height:44px; }
    body.pmin #content { display:none; }
    #panelMin { display:block; }
    #storyBox { bottom:12px; }
    #storyArt { height:120px; }
    #story .bar-t { height:60px; } #story .bar-b { display:none; }
    .btn { padding:9px 14px; }
  }
</style>
</head>

  const P=this.p, N=this.n, U=this.u, C=this.c;
  const idx=[v0,v1,v2, v0,v2,v3];

  this.quad([x0,y1,z0],[x0,y1,z1],[x1,y1,z1],[x1,y1,z0], 0,1,0, 1,1,c);
};

function facadeTex(wall, lit, litCh, industrial){
  const COLS=6, ROWS=8, MW=56, MH=46;
  const cv=document.createElement('canvas'); cv.width=COLS*MW; cv.height=ROWS*MH;
  const g=cv.getContext('2d');
  g.fillStyle=wall; g.fillRect(0,0,cv.width,cv.height);
  g.fillStyle='rgba(0,0,0,0.25)';
  for(let r=0;r<ROWS;r++) g.fillRect(0, r*MH+MH-2, cv.width, 2);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=c*MW, y=r*MH;
    if(industrial){
      g.fillStyle='rgba(255,255,255,0.04)'; g.fillRect(x+4,y+4,MW-8,MH-8);
      g.fillStyle = rnd()<litCh ? lit : '#0a0d14';
      g.fillRect(x+14,y+8,MW-28,8); continue;
    }
    const on = rnd()<litCh;
    if(on){
      const gr=g.createLinearGradient(x,y+10,x,y+MH-8);
      gr.addColorStop(0,'#fff7e6'); gr.addColorStop(1,lit);
      g.fillStyle=gr;
    } else g.fillStyle = rnd()<.5 ? '#0a0d16' : '#10141f';
    g.fillRect(x+10, y+10, MW-20, MH-18);
    g.strokeStyle='rgba(0,0,0,0.55)'; g.lineWidth=2;
    g.strokeRect(x+10, y+10, MW-20, MH-18);
    if(on && rnd()<.3){ g.fillStyle='rgba(0,0,0,0.35)'; g.fillRect(x+10,y+10,(MW-20)/2,MH-18); }
  }
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.magFilter=THREE.NearestFilter; t.minFilter=THREE.LinearMipMapLinearFilter;
  return t;
}
function signTex(text, color, big){
  const fs = big? 110 : 78;
  const cv=document.createElement('canvas');
  const tmp=cv.getContext('2d'); tmp.font='bold '+fs+'px Arial';
  cv.width = Math.max(160, Math.ceil(tmp.measureText(text).width)+90);
  cv.height = big? 190 : 140;
  const g=cv.getContext('2d');
  g.font='bold '+fs+'px Arial'; g.textAlign='center'; g.textBaseline='middle';
  g.shadowColor=color; g.shadowBlur=30; g.fillStyle=color;
  for(let i=0;i<3;i++) g.fillText(text, cv.width/2, cv.height/2);
  g.shadowBlur=8; g.fillStyle='#ffffff';
  g.fillText(text, cv.width/2, cv.height/2);
  return { tex:new THREE.CanvasTexture(cv), aspect:cv.width/cv.height };
}
function glowTex(inner, outer){
  const cv=document.createElement('canvas'); cv.width=cv.height=128;
  const g=cv.getContext('2d');
  const gr=g.createRadialGradient(64,64,2,64,64,64);
  gr.addColorStop(0, inner); gr.addColorStop(1, outer);
  g.fillStyle=gr; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(cv);
}

const artCache = {};
function locationArt(kind){
  if(artCache[kind]) return artCache[kind];
  const W=640, H=280;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const g=cv.getContext('2d');
  // gökyüzü
  const sky=g.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#12041f'); sky.addColorStop(.45,'#3a0a4a');
  sky.addColorStop(.72,'#8a1058'); sky.addColorStop(1,'#12041f');
  g.fillStyle=sky; g.fillRect(0,0,W,H);
  // güneş (çizgili)
  const sx=W/2, sy=H*0.52, sr=86;
  const sun=g.createLinearGradient(0,sy-sr,0,sy+sr);
  sun.addColorStop(0,'#ffe95c'); sun.addColorStop(.5,'#ff9a3d'); sun.addColorStop(1,'#ff2e88');
  g.save();
  g.beginPath(); g.arc(sx,sy,sr,0,7); g.clip();
  g.fillStyle=sun; g.fillRect(sx-sr,sy-sr,sr*2,sr*2);
  g.fillStyle='#12041f';
  for(let y=sy; y<sy+sr; y+=14) g.fillRect(sx-sr, y, sr*2, 5);
  g.restore();
  // yer + grid
  g.fillStyle='#0a0416'; g.fillRect(0,H*0.72,W,H*0.28);
  g.strokeStyle='#ff2e8860'; g.lineWidth=1.5;
  for(let i=-8;i<=8;i++){
    g.beginPath(); g.moveTo(sx+i*22, H*0.72); g.lineTo(sx+i*130, H); g.stroke();
  }
  for(let k=0;k<5;k++){
    const y = H*0.72 + Math.pow(k/5,1.6)*H*0.28;
    g.beginPath(); g.moveTo(0,y); g.lineTo(W,y); g.stroke();
  }
  // siluetler
  function bld(x,y,w,h,c){ g.fillStyle=c||'#0c0618'; g.fillRect(x,y,w,h);
    g.fillStyle='#ffd9a050';
    for(let wy=y+8; wy<y+h-6; wy+=14) for(let wx=x+5; wx<x+w-6; wx+=12)
      if(Math.random()<.4) g.fillRect(wx,wy,5,7);
  }
  function palmS(x,base,s){
    g.strokeStyle='#0c0618'; g.lineWidth=5*s;
    g.beginPath(); g.moveTo(x,base); g.quadraticCurveTo(x+6*s,base-30*s,x+4*s,base-52*s); g.stroke();
    g.lineWidth=3.5*s;
    for(let a=0;a<6;a++){
      const an=-Math.PI/2 + (a-2.5)*0.42;
      g.beginPath(); g.moveTo(x+4*s,base-52*s);
      g.quadraticCurveTo(x+4*s+Math.cos(an)*26*s, base-52*s+Math.sin(an)*26*s-6*s,
                         x+4*s+Math.cos(an)*40*s, base-52*s+Math.sin(an)*40*s+8*s);
      g.stroke();
    }
  }
  function neon(txt,x,y,col,fs){
    g.font='bold '+fs+'px Arial'; g.textAlign='center';
    g.shadowColor=col; g.shadowBlur=22; g.fillStyle=col;
    g.fillText(txt,x,y); g.fillText(txt,x,y);
    g.shadowBlur=6; g.fillStyle='#fff'; g.fillText(txt,x,y);
    g.shadowBlur=0;
  }
  const base=H*0.72;
  if(kind==='casino'){
    bld(60,base-120,150,120); bld(430,base-100,150,100);
    bld(220,base-150,200,150,'#100a1e');
    g.fillStyle='#1a0a14'; g.fillRect(250,base-105,140,44);
    neon('CASINO', 320, base-74, '#ff2e6e', 34);
    palmS(200,base,1); palmS(445,base,0.9);
  } else if(kind==='port'){
    for(let i=0;i<3;i++){ // vinçler
      const x=90+i*190;
      g.fillStyle='#0c0618';
      g.fillRect(x,base-130,10,130); g.fillRect(x-38,base-130,120,9);
      g.fillRect(x+70,base-121,4,36);
    }
    g.fillStyle='#0c0618';
    for(let i=0;i<6;i++) g.fillRect(40+i*100, base-30, 84, 30);
    neon('EL PUERTO', W/2, base-150, '#ffd21f', 26);
  } else if(kind==='factory'){
    g.fillStyle='#0c0618';
    for(let i=0;i<5;i++){ // testere çatı
      const x=120+i*84;
      g.beginPath(); g.moveTo(x,base); g.lineTo(x,base-96); g.lineTo(x+52,base-126);
      g.lineTo(x+52,base); g.fill();
    }
    g.fillRect(96,base-160,20,160);
    g.fillStyle='#b44dff30'; g.fillRect(90,base-190,32,34);
    neon('LOS BAJOS', W/2, base-200, '#b44dff', 26);
  } else if(kind==='office'){
    bld(120,base-190,90,190,'#0e0a20'); bld(250,base-230,110,230,'#0c0618');
    bld(400,base-170,90,170,'#0e0a20'); bld(60,base-120,60,120);
    neon('CENTRO', W/2, 56, '#19d3ff', 26);
  } else if(kind==='bar'){
    bld(180,base-130,280,130,'#140a1a');
    g.fillStyle='#1a0a14'; g.fillRect(220,base-96,200,40);
    neon('EL BAR ROJO', 320, base-68, '#ff5540', 26);
    palmS(140,base,1); palmS(480,base,1);
  } else if(kind==='villa'){
    bld(120,base-70,140,70,'#120c1a'); bld(360,base-84,150,84,'#120c1a');
    palmS(90,base,1.1); palmS(310,base,0.9); palmS(540,base,1);
    neon('LAS LOMAS', W/2, 56, '#2eff8c', 26);
  } else { // street
    bld(40,base-110,110,110); bld(170,base-140,120,140,'#100a1e');
    bld(310,base-100,100,100); bld(430,base-150,130,150,'#0e0a20');
    g.fillStyle='#ffdf9e';
    g.fillRect(150,base-58,4,58); g.fillRect(142,base-60,20,5);
    neon('BAHIA ROJA', W/2, 56, '#ff2e88', 28);
  }
  const url = cv.toDataURL();
  artCache[kind] = url;
  return url;
}

function addSign(text, color, x, y, z, h, rotY, flicker){
  const s = signTex(text, color, h>4);
  const w = h * s.aspect * 0.6;
  const mat = new THREE.MeshBasicMaterial({ map:s.tex, transparent:true, side:THREE.DoubleSide, depthWrite:false });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.set(x,y,z); mesh.rotation.y = rotY;
  scene.add(mesh);
  if(flicker) signMats.push({ mat, ph:rnd()*10, fast:rnd()<.5 });
}

function buildBuilding(key, x, z, w, d, h){
  const v = rnd()<.5 ? 0:1;
  const M = wallMerge[key][v];
  const su = w/24, sv = h/25.6, sd = d/24;
  const x0=x-w/2,x1=x+w/2, z0=z-d/2,z1=z+d/2, y0=0.22;
  M.quad([x0,y0,z1],[x1,y0,z1],[x1,h,z1],[x0,h,z1], 0,0,1, su,sv, null);
  M.quad([x1,y0,z0],[x0,y0,z0],[x0,h,z0],[x1,h,z0], 0,0,-1,su,sv, null);
  M.quad([x1,y0,z1],[x1,y0,z0],[x1,h,z0],[x1,h,z1], 1,0,0, sd,sv, null);
  M.quad([x0,y0,z0],[x0,y0,z1],[x0,h,z1],[x0,h,z0],-1,0,0, sd,sv, null);
  mergers.roof.quad([x0,h,z0],[x0,h,z1],[x1,h,z1],[x1,h,z0],0,1,0,1,1,0.55);
  mergers.dark.box(x, h, z+d/2-0.15, w, 0.4, 0.3, .5);
  mergers.dark.box(x, h, z-d/2+0.15, w, 0.4, 0.3, .5);
  mergers.dark.box(x+w/2-0.15, h, z, 0.3, 0.4, d, .5);
  mergers.dark.box(x-w/2+0.15, h, z, 0.3, 0.4, d, .5);
  if((key==='PD'||key==='CE'||key==='LB'||key==='BV') && rnd()<0.26 && h<34){
    const st = stripM[key].m, e=0.05;
    st.box(x, h+0.4, z+d/2-e, w, 0.12, 0.14);
    st.box(x, h+0.4, z-d/2+e, w, 0.12, 0.14);
    st.box(x+w/2-e, h+0.4, z, 0.14, 0.12, d);
    st.box(x-w/2+e, h+0.4, z, 0.14, 0.12, d);

  if(h>14){
    mergers.dark.box(x+rr(-w/4,w/4), h, z+rr(-d/4,d/4), rr(1.4,2.4), rr(.8,1.4), rr(1.4,2.4), .7);
    if(rnd()<.5) mergers.dark.box(x+rr(-w/4,w/4), h, z+rr(-d/4,d/4), 0.12, rr(2,5), 0.12, .8);
  }
}

const dummy = new THREE.Object3D();
function npcPoint(st){
  let s = ((st.s % PERIM) + PERIM) % PERIM;
  const side = Math.floor(s/(2*RING));
  const u = s - side*2*RING - RING;
  let x, z, hx, hz;
  if(side===0){ x=st.bx+u; z=st.bz-RING; hx=1; hz=0; }
  else if(side===1){ x=st.bx+RING; z=st.bz+u; hx=0; hz=1; }
  else if(side===2){ x=st.bx-u; z=st.bz+RING; hx=-1; hz=0; }
  else { x=st.bx-RING; z=st.bz-u; hx=0; hz=-1; }
  return [x, z, hx*st.dir, hz*st.dir];
}

      if(rnd()<dt*0.02) st.dir *= -1;
    }
    const [x,z,hx,hz] = npcPoint(st);
    const bob = st.pause>0 ? 0 : Math.abs(Math.sin(now*0.011 + st.ph))*0.06;
    dummy.position.set(x, 0.24+bob, z);
    dummy.rotation.set(0, Math.atan2(hx,hz), 0);
    dummy.updateMatrix();
    st.mesh.setMatrixAt(st.idx, dummy.matrix);
  }
  for(const st of npcs) st.mesh.instanceMatrix.needsUpdate = true;
}

  g.lineWidth=5; g.strokeStyle=col;
  g.shadowColor=col; g.shadowBlur=18; g.stroke();

  g.fillStyle=col; g.fill();
  g.shadowBlur=8; g.font='bold 46px Arial'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle='#fff'; g.fillText(sym, 64, 54);
  return new THREE.CanvasTexture(cv);
}

const raycaster = new THREE.Raycaster();
function mapClick(cx, cy){
  const ndc = new THREE.Vector2((cx/innerWidth)*2-1, -(cy/innerHeight)*2+1);
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(markerGroup.children, false);
  if(hits.length){
    const u = hits[0].object.userData;
    if(u.kind==='mission') openMissionCard(u.id);
    else openStoryCard(u.id);
    return;
  }
  // zemine tıklama → mahalle menüsü
  const ro=raycaster.ray.origin, rd=raycaster.ray.direction;
  if(Math.abs(rd.y) > 1e-5){
    const t = -ro.y/rd.y;
    const px = ro.x + rd.x*t, pz = ro.z + rd.z*t;
    if(px>-WORLD/2 && px<WORLD/2 && pz>-WORLD/2 && pz<WORLD/2){
      openDistrictCard(districtKeyOf(px,pz));
    }
  }
}

const brightMat = new THREE.ShaderMaterial({
  uniforms:{ tDiffuse:{value:null}, threshold:{value:0.52} }, vertexShader:VS,
  fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float threshold;
  void main(){ vec3 c = texture2D(tDiffuse, vUv).rgb;
    float m = max(c.r, max(c.g, c.b));
    gl_FragColor = vec4(c*smoothstep(threshold,1.0,m), 1.0); }` });
const blurMat = new THREE.ShaderMaterial({
  uniforms:{ tDiffuse:{value:null}, dir:{value:new THREE.Vector2(1,0)} }, vertexShader:VS,
  fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform vec2 dir;
  void main(){ vec3 s = texture2D(tDiffuse, vUv).rgb * 0.227027;
    vec2 o1=dir*1.3846, o2=dir*3.2308;
    s += (texture2D(tDiffuse,vUv+o1).rgb + texture2D(tDiffuse,vUv-o1).rgb) * 0.3162162;
    s += (texture2D(tDiffuse,vUv+o2).rgb + texture2D(tDiffuse,vUv-o2).rgb) * 0.0702703;
    gl_FragColor = vec4(s,1.0); }` });
const compMat = new THREE.ShaderMaterial({

function makeRecruit(){
  const tk = pick(Object.keys(NTYPES));
  const base = NTYPES[tk], st = {};
  for(const k in base) st[k] = Math.max(1, base[k] + ri(-1,2));
  return {
    id: uid++, name: pick(FIRST)+' '+pick(LAST), type: tk,
    stats: st, traits: [pick(TRAIT_KEYS)], wage: 40 + ri(0,4)*10 + st.G*5 + st.Z*5,
    loyalty: 60, busyUntil: 0, injuredUntil: 0, battles: 0, rank: 0,
    undercover: rnd() < 0.12, hiredMin: 0
  };
}
function makeMission(){
  const dk = pick(Object.keys(D));
  let mt = pick(MTYPES);
  if(mt.rare && rnd()<.6) mt = MTYPES[0];
  const fk = pick(DIST_FACTIONS[dk]);
  const phaseMul = G ? (G.phase===1? 1 : G.phase===2? 1.6 : 2.4) : 1;
  const loc = pick(DBLOCKS[dk]);
  return {
    id: uid++, k: mt.k, stat: mt.stat,
    district: dk, faction: fk,
    dur: ri(mt.dur[0], mt.dur[1]),
    pay: Math.round(rr(mt.pay[0], mt.pay[1]) * D[dk].payMul * phaseMul / 10) * 10,
    risk: mt.risk, diff: mt.diff + ri(-1,2) + (G? (G.phase-1) : 0),
    mx: loc[0]+rr(-8,8), mz: loc[1]+rr(-8,8),
    expiresMin: 0
  };
}

  const typeMap = { Thug:'tetikci', Gunman:'koruma', Wheelman:'sofor', Consigliere:'conartist' };
  const traitMap = { 'Paranoyak':'paranoyak','Acımasız':'acimasiz','Açgözlü':'acgozlu','Kıdemli':'kidemli','Sokak Kurdu':'sokak','İkiyüzlü':'ikiyuzlu','Deneyimli':'deneyimli','Veteran':'veteran' };
  const fix = c => {
    c.battles=c.battles||0; c.rank=c.rank||0;
    if(typeMap[c.type]) c.type=typeMap[c.type];
    if(!NTYPES[c.type] && c.type!=='patron') c.type='tetikci';
    c.traits=(c.traits||[]).map(t=>traitMap[t]||t);
  };
  (g.crew||[]).forEach(fix); (g.pool||[]).forEach(fix);
  for(const m of g.missions||[]){
    if(!m.k){ m.k = 'tes'; }                       // eski kayıttan gelen görevler
    if(m.mx==null){ const l=pick(DBLOCKS[m.district]); m.mx=l[0]; m.mz=l[1]; }
  }
  return g;
}
function newGame(lang){
  seed = (Date.now() & 0xffffffff) >>> 0;
  G = {
    lang: lang||'tr',
    tmin: 22*60+40, speed: 1,
    money: 500, heat: 0, phase: 1,
    rep: { LC:-20, FG:-10, CK:15, MU:0, CB:-5 },
    inf: { PD:0, BV:0, EP:0, CE:0, LL:0, LB:0 },
    crew: [], pool: [], missions: [], active: [],
    props: [], rivals: [], storyDone: {}, haracAt: {},
    armory: {}, soldiers: 0,
    log: [], touched: {}, uid: 1, savedAt: 0
  };
  G.lastHourProc = Math.floor(G.tmin/60);
  G.lastDayProc = Math.floor((G.tmin - 480)/1440);
  uid = 1;
  for(let i=0;i<6;i++) G.pool.push(makeRecruit());
  for(let i=0;i<6;i++){ const m=makeMission(); m.expiresMin = G.tmin + 720; G.missions.push(m); }
  G.uid = uid;
  addLog(T('introLog'));
}
function save(){
  try { G.savedAt = Date.now(); localStorage.setItem(SAVE_KEY, JSON.stringify(G)); } catch(e){}
}
function load(){
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if(s){ G = migrate(JSON.parse(s)); uid = G.uid || 1000; return true; }
  } catch(e){}
  return false;
}
const hadSave = load();
if(!hadSave) newGame('tr');

const BRO = { id:'BRO', name:'BRO', type:'patron', stats:{G:6,Z:6,C:6,K:6},
              traits:['yeni'], wage:0, loyalty:100, busyUntil:0, injuredUntil:0, battles:0, rank:0 };
function allMembers(){ return [BRO, ...G.crew]; }
function memberById(id){ return id==='BRO' ? BRO : G.crew.find(c=>c.id===id); }
function isFree(m){ return G.tmin >= (m.busyUntil||0) && G.tmin >= (m.injuredUntil||0) && m.loyalty >= 20; }
function crewCap(){ return G.phase===1? 5 : G.phase===2? 8 : 12; }
function solCap(){
  let cap = 3 + 5*Object.values(G.inf).filter(v=>v>=25).length;
  for(const p of G.props){ const d=propDef(p.pid); if(d && d.sol) cap += d.sol; }
  return cap;
}
function weaponBonus(n){
  const list = [];
  for(const w of WEAPONS){ const c=G.armory[w.id]||0; for(let i=0;i<c;i++) list.push(w.pow); }
  list.sort((a,b)=>b-a);
  return list.slice(0, n).reduce((s,v)=>s+v, 0);
}
function hasProp(pid){ return G.props.some(p=>p.pid===pid); }
function maxInfDistrict(){
  let best='PD', v=-1;
  for(const k in G.inf) if(G.inf[k]>v){ v=G.inf[k]; best=k; }
  return best;
}
function ownerOf(dk){ return G.inf[dk]>=50 ? null : D[dk].owner; }   // null = oyuncu
function addLog(txt){
  G.log.unshift({ d: dayOf(), h: hhmm(), txt });
  if(G.log.length > 80) G.log.pop();
}
function dayOf(){ return Math.floor(G.tmin/1440)+1; }
function hhmm(){
  const m = G.tmin % 1440;
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(Math.floor(m%60)).padStart(2,'0');
}
function fmtDur(min){
  const h=Math.floor(min/60), m=Math.floor(min%60);
  return (h? h+(G.lang==='en'?'h ':'s ') : '') + m+(G.lang==='en'?'m':'dk');
}
function lvName(){ return T('lv'+G.phase); }

// ---------- Görevler ----------
let assigning = null;
function startMission(mid, team){
  const m = G.missions.find(x=>x.id===mid);
  if(!m || !team.length) return;
  for(const id of team){ const mm=memberById(id); mm.busyUntil = G.tmin + m.dur; }
  G.active.push({ ...m, team, endMin: G.tmin + m.dur });
  G.missions = G.missions.filter(x=>x.id!==mid);
  G.touched[m.faction] = true;
  addLog(TF('mt')[m.k]+' → '+D[m.district].name);
  assigning = null;
  focusDistrict(m.district);
  rebuildMarkers();
  renderPanel(); save();
}
function promote(m){
  m.battles++;
  if(m.rank===0 && m.battles>=3){
    m.rank=1; for(const k in m.stats) m.stats[k]++;
    if(!m.traits.includes('deneyimli')) m.traits.push('deneyimli');
    addLog('★ '+m.name+' — '+TF('trait').deneyimli);
  } else if(m.rank===1 && m.battles>=10){
    m.rank=2; for(const k in m.stats) m.stats[k]++;
    if(!m.traits.includes('veteran')) m.traits.push('veteran');
    if(m.wage) m.wage = Math.round(m.wage*1.3/10)*10;
    addLog('★★ '+m.name+' — '+TF('trait').veteran);
  }
}
function resolveMission(a){
  const team = a.team.map(memberById).filter(Boolean);
  let score = 0;
  for(const m of team) score += m.stats[a.stat] + (m.loyalty-50)/25;
  score = score/Math.max(1,team.length) + (team.length-1)*1.2
        + weaponBonus(team.length)/Math.max(1,team.length) + rr(-2.5, 4.5);
  const ok = score >= a.diff;
  const mtName = TF('mt')[a.k];
  if(ok){
    G.money += a.pay;
    G.rep[a.faction] = Math.min(100, G.rep[a.faction] + ri(3,6));
    G.inf[a.district] = Math.min(100, G.inf[a.district] + 8);
    G.heat = Math.min(100, G.heat + a.risk*4);
    for(const m of team){ if(m.id!=='BRO'){ m.loyalty = Math.min(100, m.loyalty+5); promote(m); } }
    addLog('✔ '+mtName+': +$'+a.pay);
    showModal(T('opOk'), mtName+' — '+D[a.district].name+'\n\n'+T('payment')+': $'+a.pay+
      '\n'+FACTIONS[a.faction].name+' '+T('repUp')+'\n'+T('infUp'), ART_D[a.district]);
  } else {
    G.rep[a.faction] = Math.max(-100, G.rep[a.faction] - 2);
    G.heat = Math.min(100, G.heat + a.risk*8 + 3);
    let hurt = [];
    let dead = [];
    
    for(const m of team){
      if(m.id !== 'BRO') m.loyalty = Math.max(0, m.loyalty - 5);
      
      if(a.risk > 0 && rnd() < 0.4){
        // Permadeath Mekaniği: Yüksek riskli görevde %25 ihtimalle kalıcı ölüm
        if(a.risk === 2 && rnd() < 0.25 && m.id !== 'BRO') {
          dead.push(m.name);
          G.crew = G.crew.filter(c => c.id !== m.id); // Ekipten tamamen silinir
        } else {
          m.injuredUntil = G.tmin + 180;
          hurt.push(m.name);
        }
      }
    }
    
    addLog('✘ '+mtName + (dead.length ? ' — KAYIPLAR VAR!' : ''));
    
    let failMsg = T('opFailB');
    if (hurt.length) failMsg += '\n' + T('hurtL') + ': ' + hurt.join(', ');
    if (dead.length) failMsg += '\n' + (G.lang === 'en' ? 'K.I.A. (Permadeath): ' : 'KAYIPLAR (Kalıcı Ölüm): ') + dead.join(', ');
    
    showModal(T('opFail'), mtName + ' — ' + D[a.district].name + '\n\n' + failMsg, 'street');
  }
}

let storyState = null;
const elStory = document.getElementById('story');
const elStoryT = elStory.querySelector('.st');
const elStoryX = elStory.querySelector('.tx');
const elStoryC = elStory.querySelector('.ch');
const elStoryArt = document.getElementById('storyArt');
function startStory(sid){
  const s = STORIES.find(x=>x.id===sid);
  if(!s || G.storyDone[sid] || !s.unlock()) return;
  if(!allMembers().some(isFree)){ showModal(T('needCrew'), T('needCrewB')); return; }
  storyState = { story:s, step:-1, fails:0 };
  elStory.style.display='block';
  storyStep();
}
function bestFree(stat){
  let best=null;
  for(const m of allMembers()) if(isFree(m) && (!best || m.stats[stat]>best.stats[stat])) best=m;
  return best;
}
function applyFx(fx){
  if(!fx) return;
  if(fx.money) G.money += fx.money;
  if(fx.heat) G.heat = Math.min(100, G.heat + fx.heat);
  if(fx.rep) for(const k in fx.rep) G.rep[k] = Math.max(-100, Math.min(100, G.rep[k]+fx.rep[k]));
  if(fx.inf) for(const k in fx.inf) G.inf[k] = Math.max(0, Math.min(100, G.inf[k]+fx.inf[k]));
  if(fx.injure){
    const cand = G.crew.filter(isFree);
    for(let i=0;i<fx.injure && cand.length;i++){
      const m = pick(cand); m.injuredUntil = G.tmin + 240;
    }
  }
}
function storyStep(){
  const ss = storyState; ss.step++;
  const s = ss.story;
  if(ss.step >= s.steps.length){
    const fin = s.finale(ss.fails);
    applyFx(fin.fx);
    if(s.id==='sonsoz'){ G.rivals.length = 0; }
    G.storyDone[s.id] = true;
    elStoryT.textContent = LT(s.title) + ' — ' + T('end');
    elStoryX.textContent = LT(fin.text) + (fin.fx.money? '\n\n+ $'+fin.fx.money : '');
    elStoryC.innerHTML = '<span class="btn gn" id="stEnd">'+T('closeJob')+'</span>';
    document.getElementById('stEnd').onclick = ()=>{
      elStory.style.display='none'; storyState=null;
      addLog('★ '+LT(s.title));
      rebuildMarkers(); renderPanel(); save();
    };
    return;
  }
  const step = s.steps[ss.step];
  focusXZ(step.loc[0], step.loc[1]);
  elStoryArt.src = locationArt(step.art||'street');
  elStoryT.textContent = LT(s.title) + ' — ' + (ss.step+1) + '/' + s.steps.length;
  elStoryX.textContent = LT(step.text);
  elStoryC.innerHTML = step.choices.map((c,i)=>{
    const dis = c.cost && G.money < c.cost;
    return '<span class="btn'+(dis?' dis':'')+'" data-ch="'+i+'">'+LT(c.label)+'</span>';
  }).join('');
  elStoryC.querySelectorAll('[data-ch]').forEach(b=>{
    b.onclick = ()=> storyChoice(+b.dataset.ch);
  });
}
function storyChoice(i){
  const ss = storyState;
  const c = ss.story.steps[ss.step].choices[i];
  let ok = true, performer = null, resText = '';
  if(c.cost){ G.money -= c.cost; }
  if(c.stat){
    performer = bestFree(c.stat) || BRO;
    const roll = performer.stats[c.stat] + rr(0,5);
    ok = roll >= c.diff;
  }
  if(ok){
    applyFx(c.fx);
    resText = (performer? '['+performer.name+'] ' : '') + LT(c.ok);
  } else {
    ss.fails++;
    applyFx(c.failFx);
    resText = (performer? '['+performer.name+'] ' : '') + LT(c.fail);
  }
  elStoryX.textContent = resText;
  elStoryC.innerHTML = '<span class="btn cy" id="stNext">'+T('contBtn')+'</span>';
  document.getElementById('stNext').onclick = storyStep;
}

// ---------- Örgüt ilanı ----------
function canDeclare(){
  return G.phase===2 && G.money>=10000 && G.crew.length>=3 &&
         hasProp('ev') && Object.values(G.inf).some(v=>v>=25);
}
function declareOrg(){
  if(!canDeclare()) return;
  G.phase = 3;
  G.rivals.push({ name:'Sombra Nueva', rep:-40, col:'#ff4d6a', hp:3, nextAtk:0 });
  addLog('★★★ LEVEL 3 — '+T('lv3'));
  let reacts = '';
  for(const fk in FACTIONS){
    const r = G.rep[fk];
    reacts += '\n· '+FACTIONS[fk].name+': '+(r>30? T('rAlly') : r>0? T('rComp') : T('rWar'));
  }
  showModal(T('lv3T'), P(T('lv3B'), reacts), 'street');
  rebuildMarkers(); save();
}

// ---------- Çatışma ----------
function attackRival(){
  const r = G.rivals[0]; if(!r) return;
  if(G.tmin < (r.nextAtk||0)) return;
  const team = allMembers().filter(isFree);
  if(team.length < 2){ showModal(T('needCrew'), T('needCrewB')); return; }
  r.nextAtk = G.tmin + 720;
 let power = 0;
  let tacticLog = []; // Savaştaki taktiksel avantajları loglayacağız
  
  for(const m of team) power += m.stats.G + m.stats.C * 0.5;
  
  // Silah ve Durum Asimetrisi
  let wBonus = weaponBonus(team.length + Math.min(G.soldiers, 10)) * 0.4;
  
  if (G.armory['molotof'] > 0 && r.hp === 3) {
      wBonus += 4; // Rakip tam güçteyken (kalabalıkken) Molotof çok etkilidir
      tacticLog.push(G.lang === 'en' ? "Molotovs devastated their grouped ranks!" : "Molotoflar düşmanın kalabalık saflarını dağıttı!");
  }
  if (G.armory['ar15'] > 0) {
      wBonus += 2; // Saldırı tüfeği her zaman ekstra baskı kurar
      tacticLog.push(G.lang === 'en' ? "AR-15s provided heavy cover fire." : "AR-15'ler yoğun baskı ateşi sağladı.");
  }

  // Genel güç hesaplamasına taktiksel bonusu (wBonus) ekle
  power = power / team.length * 1.6 + (team.length - 2) * 1.5 + G.soldiers * 0.6 + wBonus;
  
  const need = 14 + (3-r.hp)*4;
  const roll = power + rr(-3,6);
  
  if(roll >= need){
    r.hp--;
    G.heat = Math.min(100, G.heat+10);
    const dk = maxInfDistrict();
    G.inf[dk] = Math.min(100, G.inf[dk]+5);
    for(const m of team) if(m.id!=='BRO') promote(m);
    
    addLog('⚔ Sombra Nueva '+r.hp+'/3');
    
    // Taktiksel verileri modal'a ekle
    let winMsg = P(T('clashWinB'), r.hp);
    if (tacticLog.length) winMsg += '\n\nTaktik Raporu:\n· ' + tacticLog.join('\n· ');
    winMsg += (r.hp <= 1 ? T('clashRdy') : T('clashNext'));
    
    showModal(T('clashWinT'), winMsg, 'factory');
  } else {
    const hurt = [];
    for(const m of team) if(m.id!=='BRO'){
      m.loyalty = Math.max(0, m.loyalty-5);
      if(rnd()<0.5){ m.injuredUntil = G.tmin+240; hurt.push(m.name); }
    }
    G.heat = Math.min(100, G.heat+14);
    addLog('⚔ ✘');
    showModal(T('clashLoseT'), T('clashLoseB') +
      (hurt.length? '\n'+T('hurt4')+': '+hurt.join(', ') : '') + T('clashTip'), 'factory');
  }
  rebuildMarkers(); renderPanel(); save();
}

function hourlyTick(){
  G.heat = Math.max(0, G.heat - 1);
  if(rnd() < 0.06){
    const ev = pick(CITY_EVENTS);
    ev.fx(G); addLog(LT(ev));
  }
  if(G.heat >= 80 && rnd() < 0.15){
    const fine = Math.min(Math.round(G.money*0.2), 2000);
    G.money -= fine; G.heat -= 30;
    addLog('⚠ '+T('raidT')+' -$'+fine);
    showModal(T('raidT'), P(T('raidB'), fine), 'street');
  }
  G.missions = G.missions.filter(m => G.tmin < m.expiresMin);
  let added=false;
  while(G.missions.length < 6){
    const m = makeMission(); m.expiresMin = G.tmin + 720; G.missions.push(m); added=true;
  }
  if(added) rebuildMarkers();
  G.uid = uid;
}
function dailyTick(){
  const total = G.crew.reduce((s,c)=>s+c.wage, 0) + G.soldiers*10;
  if(total > 0){
    if(G.money >= total){ G.money -= total; addLog(T('wageDay')+': -$'+total); }
    else {
      G.money = 0;
      for(const c of G.crew) c.loyalty = Math.max(0, c.loyalty-5);
      if(G.soldiers>0) G.soldiers = Math.max(0, G.soldiers - Math.ceil(G.soldiers*0.2));
      addLog(T('wageFail'));
    }
  }
  let income = 0;
  G.activeEvents = G.activeEvents || {}; // Eski kayıtların çökmemesi için güvenlik
  
  for(const p of G.props){
    const def = propDef(p.pid);
    
    // Olay ve Mülk Bağlantısı: Rıhtım grevdeyse gelir sıfırlanır
    if (p.pid === 'rihtim' && G.activeEvents.portStrike > G.tmin) {
       addLog(G.lang === 'en' ? 'Dock strike: Smuggler\'s Pier yielded $0 today.' : 'Liman grevi: Kaçak Rıhtımı bugün $0 getirdi.');
    } else {
       income += def.income;
    }
    
    if(def.daily) G.inf[p.district] = Math.min(100, G.inf[p.district] + def.daily);
  }
  if(income){ G.money += income; addLog(T('propInc')+': +$'+income); }
  for(const r of G.rivals){
    const dk = maxInfDistrict();
    const press = Math.max(1, 3 - Math.floor(G.soldiers/8));
    if(G.inf[dk] > 0){
      G.inf[dk] = Math.max(0, G.inf[dk]-press);
      addLog(r.name+' → '+D[dk].name+' -'+press);
    }
  }
  for(let i=G.crew.length-1;i>=0;i--){
    const c = G.crew[i];
    if(c.undercover && (G.tmin - c.hiredMin) > 12*1440 && rnd() < 0.10){
      const hasCon = G.crew.some(x=>x.type==='conartist' && x.id!==c.id);
      if(hasCon && rnd()<0.5){
        G.crew.splice(i,1); G.heat = Math.min(100, G.heat+5);
        addLog('⚠ '+c.name+' — '+T('ucFoundT'));
        showModal(T('ucFoundT'), P(T('ucFoundB'), c.name), 'office');
      } else {
        G.crew.splice(i,1);
        const fine = Math.min(Math.round(G.money*0.25), 2500);
        G.money -= fine; G.heat = Math.min(100, G.heat+25);
        for(const x of G.crew) x.loyalty = Math.max(0, x.loyalty-10);
        addLog('✘ '+T('ucRaidT')+' -$'+fine);
        showModal(T('ucRaidT'), P(T('ucRaidB'), c.name, fine), 'street');
      }
    }
  }
  for(let i=G.crew.length-1;i>=0;i--){
    if(G.crew[i].loyalty < 5){
      addLog('✘ '+G.crew[i].name+' '+T('left'));
      G.crew.splice(i,1);
    }
  }
  for(const f in G.rep){
    if(!G.touched[f] && G.rep[f] !== 0) G.rep[f] += G.rep[f] > 0 ? -1 : 1;
  }
  G.touched = {};
  if(G.pool.length >= 6) G.pool.shift();
  G.pool.push(makeRecruit());
  G.uid = uid;
  save();
}
function processTime(){
  for(let i=G.active.length-1;i>=0;i--){
    if(G.tmin >= G.active[i].endMin){
      const a = G.active.splice(i,1)[0];
      resolveMission(a); save();
    }
  }
  let guard = 0;
  while(Math.floor(G.tmin/60) > G.lastHourProc && guard++ < 500){
    G.lastHourProc++; hourlyTick();
  }
  guard = 0;
  while(Math.floor((G.tmin-480)/1440) > G.lastDayProc && guard++ < 40){
    G.lastDayProc++; dailyTick();
  }
  if(G.phase===3 && !G.rivals.length &&
     Object.values(G.inf).filter(v=>v>=75).length>=2){
    G.phase = 4;
    addLog('★★★★ '+T('lv4T'));
    showModal(T('lv4T'), T('lv4B'), 'casino');
  }
  if(G.phase===1 && G.money>=5000 && G.crew.length>=3){
    G.phase = 2;
    addLog('★ '+T('lv2T'));
    showModal(T('lv2T'), T('lv2B'), 'street');
    rebuildMarkers();
  }
}
function applyOffline(){
  if(!hadSave || !G.savedAt) return;
  const elapsedSec = (Date.now() - G.savedAt)/1000;
  const gm = Math.min(elapsedSec * (G.speed||1), 600);
  if(gm > 30){
    G.tmin += gm;
    processTime();
    showModal(T('offT'), P(T('offB'), Math.round(gm/60)));
  }
}

function statLine(m){
  const S = TF('stat');
  return S.G+' '+m.stats.G+' · '+S.Z+' '+m.stats.Z+' · '+S.C+' '+m.stats.C+' · '+S.K+' '+m.stats.K;
}
function memberCard(m, fireable){
  const busy = G.tmin < (m.busyUntil||0);
  const hurt = G.tmin < (m.injuredUntil||0);
  const status = hurt? T('injured')+' ('+fmtDur(m.injuredUntil-G.tmin)+')'
    : busy? T('onJob')+' ('+fmtDur(m.busyUntil-G.tmin)+')'
    : m.loyalty<20? T('sulking') : T('avail');
  const rank = m.rank===2? '★★ ' : m.rank===1? '★ ' : '';
  return '<div class="card"><div class="row"><h3>'+rank+esc(m.name)+'</h3>'+
    '<span class="tag" style="color:#aab;border-color:#445">'+TF('ntype')[m.type]+'</span></div>'+
    '<div class="statline" style="margin-top:4px">'+statLine(m)+' · '+T('battles')+' '+(m.battles||0)+'</div>'+
    '<div class="muted" style="margin-top:3px">'+m.traits.map(t=>TF('trait')[t]||t).join(', ')+
    (m.wage? ' · '+T('perDay')+' $'+m.wage : '')+'</div>'+
    '<div class="row" style="margin-top:6px"><span class="statline" style="color:'+
    (hurt?'#ff6a4d':busy?'#7ae0ff':'#5cffa8')+'">'+status+'</span>'+
    (m.id!=='BRO' ? '<span class="statline">'+T('loyalty')+' '+Math.round(m.loyalty)+'</span>' : '')+'</div>'+
    (m.id!=='BRO' ? '<div class="bar" style="margin-top:4px"><div style="width:'+m.loyalty+'%;background:'+
      (m.loyalty>50?'#2eff8c':m.loyalty>20?'#ffd21f':'#ff1030')+'"></div></div>' : '')+
    (m.id!=='BRO' ? '<div style="margin-top:8px"><span class="btn gn '+(G.money>=100?'':'dis')+
      '" data-act="bonus" data-id="'+m.id+'">'+T('bonusBtn')+'</span> '+
      (fireable? '<span class="btn cy" data-act="fire" data-id="'+m.id+'">'+T('fire')+'</span>':'')+'</div>':'')+
    '</div>';
}
elContent.addEventListener('click', e=>{
  const b = e.target.closest('[data-act]'); if(!b) return;
  const act = b.dataset.act;
  if(act==='assign'){ assigning = +b.dataset.mid; renderPanel(); }
  else if(act==='cancel'){ assigning = null; renderPanel(); }
  else if(act==='focus'){ focusDistrict(b.dataset.d); if(innerWidth<=820) document.body.classList.add('pmin'); }
  else if(act==='go'){
    const mid = +b.dataset.mid;
    const team = [...elContent.querySelectorAll('input[data-mid="'+mid+'"]:checked')]
      .map(i => i.dataset.member==='BRO' ? 'BRO' : +i.dataset.member);
    if(!team.length) return;
    startMission(mid, team);
  }
  else if(act==='hire'){
    const id = +b.dataset.id;
    const c = G.pool.find(x=>x.id===id); if(!c) return;
    const cost = c.wage*3;
    if(G.money >= cost && G.crew.length < crewCap()){
      G.money -= cost;
      c.hiredMin = G.tmin;
      G.crew.push(c);
      G.pool = G.pool.filter(x=>x.id!==id);
      addLog('✔ ' + c.name + ' ' + T('joined'));
      renderPanel(); save();
    }
  }
  else if(act==='buy'){
    const pid = b.dataset.p, dk = b.dataset.d;
    const pr = propDef(pid); if(!pr) return;
    if(G.money >= pr.cost && G.inf[dk] >= pr.req){
      G.money -= pr.cost;
      G.inf[dk] = Math.min(100, G.inf[dk] + (pr.unique? 0 : 10));
      G.props.push({ pid, district:dk });
      addLog('★ ' + TF('prop')[pid] + ' ' + T('bought'));
      renderPanel(); save();
    }
  }
  else if(act==='wbuy'){
    const id = b.dataset.id;
    const w = WEAPONS.find(x=>x.id===id);
    if(w && G.money >= w.cost){
      G.money -= w.cost;
      G.armory[id] = (G.armory[id]||0) + 1;
      renderPanel(); save();
    }
  }
  else if(act==='bonus'){
    const id = b.dataset.id;
    if(G.money >= 100){
      G.money -= 100;
      const m = memberById(id);
      if(m){ m.loyalty = Math.min(100, m.loyalty+10); renderPanel(); save(); }
    }
  }
  else if(act==='fire'){
    const id = +b.dataset.id;
    const m = memberById(id);
    if(m){
      G.crew = G.crew.filter(x=>x.id!==id);
      addLog('✘ ' + m.name + ' ' + T('fired'));
      renderPanel(); save();
    }
  }
  else if(act==='solh'){
    const n = +b.dataset.n;
    const cost = n*150;
    if(G.money >= cost && G.soldiers+n <= solCap()){
      G.money -= cost; G.soldiers += n; renderPanel(); save();
    }
  }
  else if(act==='sold'){
    if(G.soldiers > 0){ G.soldiers--; renderPanel(); save(); }
  }
  else if(act==='harac'){
    const dk = b.dataset.d;
    const amt = 100 + Math.round(G.inf[dk]*4/10)*10;
    G.money += amt;
    G.haracAt[dk] = G.tmin + 1440;
    addLog('✔ ' + D[dk].name + ' harac: +$' + amt);
    renderPanel(); save();
  }
  else if(act==='bribe'){
    if(G.money >= 500){
      G.money -= 500; G.heat = Math.max(0, G.heat-20);
      renderPanel(); save();
    }
  }
  else if(act==='atk'){ attackRival(); }
  else if(act==='story'){ startStory(b.dataset.id); }
  else if(act==='declare'){ declareOrg(); renderPanel(); }
  else if(act==='lang'){
    G.lang = G.lang==='tr' ? 'en' : 'tr';
    addLog('Language changed / Dil değiştirildi.');
    initTitle(); renderPanel(); save();
  }
  else if(act==='exp'){
    const dat = JSON.stringify(G);
    if(navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(dat).then(()=>{ showModal(T('expT'), T('expB')); })
      .catch(()=>{ prompt(T('expM'), dat); });
    } else {
      prompt(T('expM'), dat);
    }
  }
  else if(act==='imp'){
    const s = prompt(T('impM'));
    if(s){
      try {
        G = migrate(JSON.parse(s));
        uid = G.uid || 1000;
        showModal(T('impT'), T('impB'));
        rebuildMarkers(); renderPanel(); save();
      } catch(e){ showModal(T('impErrT'), T('impErrB')); }
    }
  }
  else if(act==='reset'){
    if(confirm(T('resetQ'))){ localStorage.removeItem(SAVE_KEY); location.reload(); }
  }
});

// Modal Sistemi
const elModal = document.getElementById('modal');
const elModalArt = document.getElementById('modalArt');
const elModalT = elModal.querySelector('h2');
const elModalX = elModal.querySelector('p');
function showModal(title, text, artKind){
  elModalT.textContent = title;
  elModalX.textContent = text;
  if(artKind){ elModalArt.src = locationArt(artKind); elModalArt.style.display='block'; }
  else elModalArt.style.display='none';
  elModal.style.display='flex';
}
document.getElementById('modalOk').onclick = ()=> elModal.style.display='none';

// Arayüz (UI) Güncellemeleri
const elMoney = document.querySelector('#tMoney .v');
const elHeat = document.querySelector('#tHeat .v');
const elHeatBar = document.querySelector('#heatbar div');
const elTime = document.querySelector('#tTime');
const elPhase = document.querySelector('#tPhase .v');
const elSol = document.querySelector('#tSol .v');
let lastPhase = 0;
function updateUI(){
  if(!G) return;
  elMoney.textContent = '$' + G.money.toLocaleString();
  elHeat.textContent = Math.round(G.heat);
  elHeatBar.style.width = G.heat + '%';
  elTime.innerHTML = '<div class="l">' + T('day') + ' ' + dayOf() + '</div><div class="v" style="color:#cfe8ff">' + hhmm() + '</div>';
  elPhase.textContent = G.phase;
  elSol.textContent = G.soldiers + '/' + solCap();
  if(G.phase !== lastPhase){ elPhase.style.color = (G.phase===4?'#ffd84d':G.phase===3?'#b44dff':G.phase===2?'#2eff8c':'#c878ff'); lastPhase=G.phase; }
  const mb = elMoney.parentElement;
  if(G.money < 0 && !mb.style.color){ mb.style.color = '#ff1030'; }
  else if(G.money >= 0 && mb.style.color) mb.style.color = '';
}

// Giriş ve Menü Ekranı (Title Screen)
const elTitle = document.getElementById('title');
document.querySelectorAll('#tLang .btn').forEach(b=>b.onclick=e=>{
  document.querySelectorAll('#tLang .btn').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel');
  G = G || {}; G.lang = b.dataset.lang;
  initTitle();
});
function initTitle(){
  const lang = (G&&G.lang)||'tr';
  document.querySelector('#tLang .btn[data-lang="'+lang+'"]').classList.add('sel');
  document.querySelector('#tLang .btn[data-lang="'+(lang==='tr'?'en':'tr')+'"]').classList.remove('sel');
  let st = '';
  if(hadSave) st += '<span class="btn cy" id="btnCont">' + T('cont') + '</span>';
  st += '<span class="btn" id="btnNew">' + T('newgame') + '</span>';
  document.getElementById('tStart').innerHTML = st;
  document.getElementById('tHint').textContent = T('titleHint');
  
  const btnCont = document.getElementById('btnCont');
  if(btnCont) btnCont.onclick = startGame;
  document.getElementById('btnNew').onclick = ()=>{
    if(hadSave && !confirm(T('resetQ'))) return;
    newGame(document.querySelector('#tLang .btn.sel').dataset.lang);
    startGame();
  };
}

function startGame(){
  elTitle.style.display = 'none';
  applyOffline();
  rebuildMarkers();
  renderPanel();
}
// Oyunu başlat / Init
if(hadSave){ initTitle(); } else { initTitle(); }

const spdBtn = document.getElementById('spdBtn');
spdBtn.onclick = ()=>{
  if(!G) return;
  G.speed = G.speed===1 ? 3 : G.speed===3 ? 10 : 1;
  spdBtn.textContent = T('speed') + ' ' + G.speed + '×';
  save();
};
if(G && G.speed) spdBtn.textContent = T('speed') + ' ' + G.speed + '×';

const sndBtn = document.getElementById('sndBtn');
let soundOn = false;
sndBtn.onclick = ()=>{ soundOn = !soundOn; sndBtn.style.color = soundOn?'#4dddff':'#667'; };

// Ana Render & Update Döngüsü (Animation Loop)
let lastT = 0, pt=0;
function animate(t){
  requestAnimationFrame(animate);
  const dt = Math.min(0.1, (t - lastT) / 1000);
  lastT = t;
  
  if(elTitle.style.display !== 'none'){
    renderBloom();
    return;
  }
  
  if(G){
    pt += dt;
    if(pt > 1.0/G.speed){ G.tmin++; processTime(); pt=0; }
  }

  let dx=0, dz=0;
  if(keys.KeyW) { dx+=PAN.KeyW[0]; dz+=PAN.KeyW[1]; }
  if(keys.KeyS) { dx+=PAN.KeyS[0]; dz+=PAN.KeyS[1]; }
  if(keys.KeyA) { dx+=PAN.KeyA[0]; dz+=PAN.KeyA[1]; }
  if(keys.KeyD) { dx+=PAN.KeyD[0]; dz+=PAN.KeyD[1]; }
  if(dx||dz){
    const pp = viewSize/innerHeight * 1600 * dt;
    camGoal.x += dx*pp; camGoal.z += dz*pp;
    camGoal.x = Math.max(-WORLD/2, Math.min(WORLD/2, camGoal.x));
    camGoal.z = Math.max(-WORLD/2, Math.min(WORLD/2, camGoal.z));
  }

  camTarget.lerp(camGoal, dt*6);
  camera.position.copy(camTarget).add(CAM_OFF);
  camera.lookAt(camTarget);

  updateNPCs(dt, t);
  updateCars(dt, t);

  for(const s of signMats){
    if(s.fast) s.mat.color.setScalar(rnd()<.2? 0.1 : 1);
    else s.mat.color.setScalar(Math.sin(t*0.005 + s.ph)>0? 1 : 0.1);
  }
  
  // Marker Hover Effect (Pulsing)
  if (hoveredSprite) {
    const pulse = 1 + Math.sin(t * 0.008) * 0.15;
    hoveredSprite.scale.setScalar(hoveredSprite.userData.kind === 'story' ? 9 * pulse : 7 * pulse);
  } else {
    markerGroup.children.forEach(c => {
      c.scale.setScalar(c.userData.kind === 'story' ? 9 : 7);
    });
  }

  updateUI();
  renderBloom();
}
requestAnimationFrame(animate);
